<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtByte | Painel</title>
    <link rel="stylesheet" href="site-loja/css/style.css">
</head>
<body class="login-page">
<div id="toast" class="toast hidden"></div>
<div class="login-container">
    <div class="brand-bar">
        <div class="logo" aria-label="Logo ArtByte"></div>
        <div class="brand-copy">
            <strong>ARTBYTE</strong>
            <p class="brand-subtitle">Desde 2026</p>
        </div>
    </div>

    <div class="login-card">
        <div class="card-header">
            <p class="tag">Acesso</p>
            <h1 id="authTitle">Entrar</h1>
            <p id="authDescription" class="card-note">Use seu email e senha para acessar o painel.</p>
        </div>
        <div class="auth-tabs">
            <button id="loginTab" type="button" class="auth-tab active" onclick="mostrarLogin()">Entrar</button>
            <button id="registerTab" type="button" class="auth-tab" onclick="mostrarCadastro()">Cadastrar</button>
        </div>

        <form id="loginForm" onsubmit="event.preventDefault(); login();">
            <label>
                <span>Email</span>
                <input id="email" type="email" placeholder="seu@email.com" required>
            </label>
            <label>
                <span>Senha</span>
                <input id="senha" type="password" placeholder="********" required>
            </label>
            <button type="submit">Entrar</button>
        </form>

        <form id="registerForm" class="hidden-auth-form" onsubmit="event.preventDefault(); cadastrar();">
            <label>
                <span>Nome de usuario</span>
                <input id="cadastroNome" type="text" placeholder="Arthur Lima" required>
            </label>
            <label>
                <span>Email</span>
                <input id="cadastroEmail" type="email" placeholder="novo@email.com" required>
            </label>
            <label>
                <span>Senha</span>
                <input id="cadastroSenha" type="password" placeholder="Crie uma senha" required>
            </label>
            <button type="submit">Criar conta</button>
        </form>
    </div>
</div>

<script src="site-loja/js/api.js"></script>
<script src="site-loja/js/auth.js"></script>
</body>
</html>
