<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuracoes | ArtByte Store</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="store-page">
<div class="store-shell">
    <header class="store-header store-header-wide">
        <div class="store-brand">
            <div class="store-logo"></div>
            <div>
                <p class="tag">Conta</p>
                <h1>Configuracoes</h1>
            </div>
        </div>

        <div class="store-topbar-actions align-end">
            <a class="button-secondary" href="./produtos.html">Voltar para produtos</a>

            <div class="user-menu-wrapper">
                <button id="userMenuButton" type="button" class="user-menu-button" onclick="toggleUserMenu()">
                    <span id="userAvatar" class="user-avatar">AB</span>
                    <span class="user-meta">
                        <strong id="userName">Usuario</strong>
                        <small id="userEmail">email@email.com</small>
                    </span>
                </button>

                <div id="userDropdown" class="user-dropdown hidden">
                    <button type="button" onclick="abrirCarrinho()">Carrinho</button>
                    <button type="button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main class="single-panel-layout">
        <section class="card settings-card">
            <div class="section-heading">
                <div>
                    <p class="tag">Perfil</p>
                    <h2>Atualize seus dados</h2>
                </div>
            </div>

            <div id="toast" class="toast hidden"></div>

            <form class="settings-form" onsubmit="event.preventDefault(); salvarConfiguracoes();">
                <label>
                    <span>Nome</span>
                    <input id="configNome" type="text" placeholder="Seu nome" required>
                </label>
                <label>
                    <span>Email</span>
                    <input id="configEmail" type="email" placeholder="seu@email.com" required>
                </label>
                <label>
                    <span>Nova senha</span>
                    <input id="configSenha" type="password" placeholder="Deixe em branco para manter a atual">
                </label>
                <div class="form-actions">
                    <button type="submit" class="button-primary">Salvar alteracoes</button>
                    <a class="button-secondary" href="./produtos.html">Cancelar</a>
                </div>
            </form>
        </section>
    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/store-common.js"></script>
<script src="../js/conta.js"></script>
</body>
</html>
