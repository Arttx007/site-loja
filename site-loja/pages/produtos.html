<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Loja</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body onload="listarProdutos()">
<div class="page products-page">
    <header class="products-header">
        <div>
            <p class="tag">Loja Digital</p>
            <h1>Produtos</h1>
            <p class="subtitle">Confira os itens disponíveis para venda.</p>
        </div>
        <a class="button-back" href="../index.html">← Voltar</a>
    </header>

    <main class="content">
        <div id="toast" class="toast hidden"></div>
        <div class="card product-card">
            <div class="product-panel">
                <div>
                    <p class="tag">Gerenciar Produtos</p>
                    <h2 id="formTitle">Produtos</h2>
                    <p class="card-note" id="formNote">Clique em "Novo Produto" para abrir o formulário.</p>
                </div>
                <button type="button" class="button-secondary" onclick="mostrarFormularioAdd()">Novo Produto</button>
            </div>

            <form id="product-form" class="product-form hidden" onsubmit="event.preventDefault(); salvarProduto();">
                <input type="hidden" id="produtoId">
                <label>
                    <span>Nome do produto</span>
                    <input id="produtoNome" type="text" placeholder="Mouse Gamer" required>
                </label>
                <label>
                    <span>Preço</span>
                    <input id="produtoPreco" type="number" step="0.01" placeholder="150.00" required>
                </label>
                <label>
                    <span>Quantidade</span>
                    <input id="produtoQuantidade" type="number" placeholder="10" required>
                </label>
                <div class="form-actions">
                    <button type="submit" class="button-primary" id="submitButton">Adicionar</button>
                    <button type="button" class="button-secondary" onclick="ocultarFormulario()">Cancelar</button>
                </div>
            </form>

            <ul class="product-list" id="lista"></ul>
        </div>
    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/produto.js"></script>
</body>
</html>
