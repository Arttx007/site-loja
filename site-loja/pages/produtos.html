<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | ArtByte Store</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="store-page">
<div class="store-shell">
    <header class="store-header store-header-wide">
        <div class="store-brand">
            <div class="store-logo"></div>
            <div>
                <p class="tag">Marketplace</p>
                <h1>ArtByte Store</h1>
            </div>
        </div>

        <div class="store-search">
            <input id="searchInput" type="search" placeholder="Buscar produto..." oninput="filtrarProdutos()">
        </div>

        <div class="store-topbar-actions">
            <button type="button" class="cart-trigger" onclick="abrirCarrinho()">
                <span class="cart-trigger-icon">Carrinho</span>
                <span id="headerCartCount" class="cart-trigger-badge">0</span>
            </button>

            <div class="user-menu-wrapper">
                <button id="userMenuButton" type="button" class="user-menu-button" onclick="toggleUserMenu()">
                    <span id="userAvatar" class="user-avatar">AB</span>
                    <span class="user-meta">
                        <strong id="userName">Usuario</strong>
                        <small id="userEmail">email@email.com</small>
                    </span>
                </button>

                <div id="userDropdown" class="user-dropdown hidden">
                    <button type="button" onclick="abrirConfiguracoes()">Configuracoes</button>
                    <button type="button" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </header>

    <main class="store-layout-single">
        <section class="store-main">
            <div id="toast" class="toast hidden"></div>

            <section id="adminPanel" class="card admin-panel hidden">
                <div class="admin-panel-header">
                    <div>
                        <p class="tag">Painel Admin</p>
                        <h2 id="formTitle">Adicionar produto</h2>
                        <p class="card-note" id="formNote">Cadastre produtos com imagem, preco e estoque.</p>
                    </div>
                    <button type="button" class="button-secondary" onclick="ocultarFormulario()">Fechar</button>
                </div>

                <div class="admin-toolbar">
                    <button id="novoProdutoButton" type="button" class="button-secondary" onclick="mostrarFormularioAdd()">Novo produto</button>
                </div>

                <form id="product-form" class="product-form hidden" onsubmit="event.preventDefault(); salvarProduto();">
                    <input type="hidden" id="produtoId">
                    <label>
                        <span>Nome do produto</span>
                        <input id="produtoNome" type="text" placeholder="Headset gamer" required>
                    </label>
                    <label>
                        <span>Preco</span>
                        <input id="produtoPreco" type="number" step="0.01" min="0" max="100000" placeholder="299.90" required>
                    </label>
                    <label>
                        <span>Quantidade</span>
                        <input id="produtoQuantidade" type="number" min="0" placeholder="12" required>
                    </label>
                    <label>
                        <span>URL da imagem</span>
                        <input id="produtoImagemUrl" type="url" placeholder="https://...">
                    </label>
                    <div class="form-actions">
                        <button type="submit" class="button-primary" id="submitButton">Adicionar</button>
                        <button type="button" class="button-secondary" onclick="resetarFormulario(); ocultarFormulario();">Cancelar</button>
                    </div>
                </form>
            </section>

            <section class="catalog-section">
                <div class="catalog-toolbar">
                    <div>
                        <p class="tag">Produtos</p>
                        <h2>Ofertas para voce</h2>
                    </div>
                    <p id="catalogInfo" class="catalog-info">Carregando catalogo...</p>
                </div>
                <div id="catalogoVazio" class="card catalog-empty hidden">Nenhum produto encontrado.</div>
                <div id="catalogoProdutos" class="catalog-grid"></div>
            </section>
        </section>
    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/store-common.js"></script>
<script src="../js/produto.js"></script>
</body>
</html>
